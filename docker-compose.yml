services:
  db:
    image: postgres:16
    container_name: betterspeech-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: betterspeech
      POSTGRES_USER: bsuser
      POSTGRES_PASSWORD: bspass
    ports:
      - "5433:5432"
    volumes:
      - betterspeech_data:/var/lib/postgresql/data

volumes:
  betterspeech_data: