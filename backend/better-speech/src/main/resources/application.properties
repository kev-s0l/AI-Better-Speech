spring.application.name=better-speech

# --- Database connection ---
# Format: jdbc:postgresql://HOST:PORT/DATABASE_NAME
spring.datasource.url=jdbc:postgresql://localhost:5433/betterspeech
spring.datasource.username=bsuser
spring.datasource.password=bspass

# --- JPA / Hibernate ---
# 'update' = auto-create/alter tables to match your entities. Great for dev.
# (Later, in production, you'd switch this to 'validate' + real migrations.)
spring.jpa.hibernate.ddl-auto=update

# Print the SQL Hibernate generates, so you can SEE what's happening
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true